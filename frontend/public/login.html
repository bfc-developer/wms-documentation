<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Docs - BFC Group</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="shortcut icon" href="https://bfcgroup.in/assets/images/logo.webp" type="image/x-icon">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <div class="container my-5 py-5">
        <div class="card">
            <div class="card-body">
                <h2 class="card-title"><img style="width:100px;" src="https://bfcgroup.in/assets/images/logo.webp" alt=""></h2>
                <h2 class="card-title">Docs Login</h2>
                <form id="login-form" autocomplete="off" autocorrect="off">
                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="text" class="form-control" id="email" name="email" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Login</button>
                </form>
                <form id="TFA-form" autocomplete="off" autocorrect="off">
                    <div id="qrcode"></div>
                    <div id="qror">
                        <small>Scan the QR code with your authenticator app</small>
                        <h4 id="">Then</h4>
                    </div>
                    <div class="mb-3">
                        <label for="TFAcode" class="form-label">Enter TFA Code</label>
                        <input type="password" class="form-control" id="TFAcode" name="TFAcode" required>
                        <small>Enter the code from your authenticator app</small>
                    </div>
                    <div class="row justify-content-between">
                        <div class="col-3">
                            <button type="submit" class="btn btn-primary">Verify</button>
                        </div>
                        <div class="col-3">
                            <a id="logout" class="logout-btn" title="Logout">Logout <i class="fas fa-sign-out"></i></a>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>    
<script src="https://cdn.jsdelivr.net/gh/davidshimjs/qrcodejs/qrcode.min.js"></script>
<script src="/auth.js"></script>
</html>
